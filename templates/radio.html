<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Radio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <div class="radio-player"{% if not enable_atc %} style="display: none"{% endif %}>
            <div class="status-bar">
                <div class="status-info">
                    <span id="atcStatusText" class="status-text">ATC Radio OFF</span>
                    <span id="atcSelectedCount" class="selected-count"></span>
                </div>
                <div class="control-group">
                    <div class="power-toggle">
                        <label class="toggle-switch">
                            <input type="checkbox" id="atcPowerToggle" aria-label="Power toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button id="atcRefreshBtn" class="btn btn-icon-green" aria-label="Refresh frequencies">
                        🔄
                    </button>
                </div>
            </div>

            <div class="frequencies-section">
                <h2>Available Frequencies</h2>
                <div class="frequencies-grid" id="atcFrequenciesGrid">
                    <!-- Frequency buttons will be generated here -->
                </div>
            </div>

            <div class="player-section" id="atcAudioContainer">
                <!-- Audio element will be created here dynamically -->
            </div>
        </div>

        <br>
        <div class="radio-player"{% if not enable_fm %} style="display: none"{% endif %}>
            <div class="status-bar">
                <div class="status-info">
                    <span id="fmStatusText" class="status-text">FM Radio OFF</span>
                </div>
                <div class="control-group">
                    <div class="power-toggle">
                        <label class="toggle-switch">
                            <input type="checkbox" id="fmPowerToggle" aria-label="FM Power toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button id="fmRefreshBtn" class="btn btn-icon-green" aria-label="Refresh FM stream">
                        🔄
                    </button>
                </div>
            </div>

            <div class="fm-control-section">
                <h2>Frequency Selection</h2>
                <div class="fm-input-group">
                    <div class="fm-arrow-buttons">
                        <button id="fmUpBtn" class="fm-arrow-btn fm-arrow-up" aria-label="Increase frequency">▲</button>
                        <button id="fmDownBtn" class="fm-arrow-btn fm-arrow-down" aria-label="Decrease frequency">▼</button>
                    </div>
                    <div class="fm-input-wrapper">
                        <input type="number" id="fmFrequencyInput" class="fm-input" min="87.5" max="108.0" step="0.1" value="95.9" aria-label="FM frequency">
                        <span class="fm-unit">MHz</span>
                    </div>
                </div>
            </div>

            <div class="player-section" id="fmAudioContainer">
                <!-- FM Audio element will be created here dynamically -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '{{ api_url }}';
        const FREQUENCIES = {{ freqs | tojson }};
        const STREAM_URL = '{{ stream_url }}';
    </script>
    <script type="module" src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
